<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" (click)="onClose()">
  <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl" (click)="$event.stopPropagation()">

    <div class="flex justify-between items-center mb-7">
      <h2 class="text-xl font-bold text-gray-800">Adicionar Livro</h2>
      <button class="text-gray-400 hover:text-gray-700 text-lg cursor-pointer bg-transparent border-none" (click)="onClose()">✕</button>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="flex flex-col gap-1.5 mb-5">
        <label class="text-xs font-semibold text-gray-600">Título</label>
        <input type="text" [(ngModel)]="title" name="title" placeholder="Ex: Dom Casmurro"
          class="px-4 py-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-gray-400 transition-colors" />
      </div>

      <div class="flex flex-col gap-1.5 mb-5">
        <label class="text-xs font-semibold text-gray-600">Autor</label>
        <input type="text" [(ngModel)]="author" name="author" placeholder="Ex: Machado de Assis"
          class="px-4 py-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-gray-400 transition-colors" />
      </div>

      <div class="flex flex-col gap-1.5 mb-5">
        <label class="text-xs font-semibold text-gray-600">Gênero</label>
        <input type="text" [(ngModel)]="genre" name="genre" placeholder="Ex: Romance"
          class="px-4 py-2.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-gray-400 transition-colors" />
      </div>

      <div class="flex gap-3 justify-end mt-2">
        <button type="button" (click)="onClose()"
          class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm font-semibold transition-colors cursor-pointer border-none">
          Cancelar
        </button>
        <button type="submit"
          class="px-6 py-2.5 bg-gray-700 hover:bg-gray-800 text-white rounded-lg text-sm font-semibold transition-colors cursor-pointer border-none">
          Adicionar
        </button>
      </div>
    </form>

  </div>
</div>
