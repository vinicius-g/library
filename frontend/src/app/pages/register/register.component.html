<div class="min-h-screen flex flex-col bg-gradient-to-br from-gray-500 via-gray-600 to-gray-700">
  
  <header class="bg-gray-800 px-8 h-16 flex items-center shadow-lg">
    <div class="flex items-center gap-3">
      <span class="text-2xl">📚</span>
      <h1 class="text-lg font-bold text-white">Biblioteca Comunitária</h1>
    </div>
  </header>

  <div class="flex-1 flex items-center justify-center p-8">
    <p-card class="w-full max-w-md">
      <ng-template pTemplate="header">
        <div class="text-center pt-6">
          <h2 class="text-2xl font-bold text-gray-800">Criar nova conta</h2>
        </div>
      </ng-template>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5 p-4">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold">CPF</label>
          <input
            pInputText
            formControlName="cpf"
            (input)="onCpfInput($event)"
            placeholder="000.000.000-00"
            maxlength="14"
            class="w-full"
            [class.ng-invalid]="isInvalid('cpf')"
            [class.ng-dirty]="isInvalid('cpf')"
          />
          <small *ngIf="isInvalid('cpf')" class="text-red-500">
            CPF inválido. Digite um CPF válido.
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold">Senha</label>
          <p-password
            formControlName="password"
            placeholder="Digite sua senha (mínimo 6 caracteres)"
            [toggleMask]="true"
            [feedback]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
          <small *ngIf="isInvalid('password')" class="text-red-500">
            Senha deve ter no mínimo 6 caracteres.
          </small>
        </div>

        <div class="text-center">
          <p-button
            label="Já tem uma conta? Faça login"
            [text]="true"
            [link]="true"
            size="small"
            severity="secondary"
            (onClick)="goToLogin()"
          />
        </div>

        <p-button
          label="Registrar"
          type="submit"
          [disabled]="form.invalid"
          severity="secondary"
          styleClass="w-full bg-gray-700 hover:bg-gray-800 border-gray-700 disabled:bg-gray-300"
        />
      </form>
    </p-card>
  </div>

</div>
