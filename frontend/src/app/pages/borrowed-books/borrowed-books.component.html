<div class="min-h-screen bg-gray-100">
  <app-header />

  <main class="p-8 max-w-6xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
      <h2 class="text-2xl font-bold text-gray-800">Meus Livros</h2>
      <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full">
        {{ borrowings.length }} empréstimos
      </span>
    </div>

    <div *ngIf="loading" class="flex justify-center items-center py-16">
      <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600"></div>
    </div>

    <div *ngIf="!loading && borrowings.length === 0" class="text-center py-16">
      <i class="pi pi-inbox text-6xl text-gray-400 mb-4"></i>
      <p class="text-gray-600 text-lg">Você não possui livros emprestados no momento.</p>
    </div>

    <div *ngIf="!loading && borrowings.length > 0" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
      <app-borrowed-book-card *ngFor="let borrowing of borrowings" [borrowing]="borrowing" />
    </div>
  </main>

</div>
